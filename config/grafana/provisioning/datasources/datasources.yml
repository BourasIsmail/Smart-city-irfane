apiVersion: 1
datasources:
  - name: CrateDB (QuantumLeap)
    type: postgres
    url: cratedb:5432
    database: doc
    user: crate
    secureJsonData:
      password: ""
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1200
      timescaledb: false
    isDefault: true
    editable: true